name: iOS Build

on:
  push:
    paths:
      - "ios/YourHealthyPantryIOS/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/YourHealthyPantryIOS/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build SwiftUI iOS app
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ios/YourHealthyPantryIOS/YourHealthyPantryIOS.xcodeproj \
            -target YourHealthyPantryIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            build
