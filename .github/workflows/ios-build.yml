name: iOS Build

on:
  push:
    paths:
      - "ios/YourHealthyPantryIOS/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/YourHealthyPantryIOS/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build SwiftUI iOS app
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app
        run: |
          set -o pipefail
          set +e
          xcodebuild \
            -project ios/YourHealthyPantryIOS/YourHealthyPantryIOS.xcodeproj \
            -target YourHealthyPantryIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Xcode build failed. Showing the most useful compiler lines:"
            grep -E "error:|warning:" xcodebuild.log | tail -80 || true
            while IFS= read -r line; do
              if [[ "$line" =~ ^(.+):([0-9]+):([0-9]+):[[:space:]]error:[[:space:]](.*)$ ]]; then
                echo "::error file=${BASH_REMATCH[1]},line=${BASH_REMATCH[2]},col=${BASH_REMATCH[3]}::${BASH_REMATCH[4]}"
              elif [[ "$line" == *"error:"* ]]; then
                echo "::error ::$line"
              fi
            done < <(grep -E "error:" xcodebuild.log | tail -40 || true)
            exit "$status"
          fi
